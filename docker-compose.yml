services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campaign_builder
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - campaign_builder_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d campaign_builder"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run migrate && npm run seed && npm run dev"
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://postgres:postgres@db:5432/campaign_builder
      LIBRETRANSLATE_URL: ${LIBRETRANSLATE_URL:-http://libretranslate:5000}
      META_SYNC_PROVIDER: ${META_SYNC_PROVIDER:-}
      META_GRAPH_VERSION: ${META_GRAPH_VERSION:-v20.0}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_PAGE_ID: ${META_PAGE_ID:-}
      META_INSTAGRAM_ACTOR_ID: ${META_INSTAGRAM_ACTOR_ID:-}
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "${BACKEND_HOST_PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy
      libretranslate:
        condition: service_started

  libretranslate:
    image: libretranslate/libretranslate:latest
    ports:
      - "${LIBRETRANSLATE_HOST_PORT:-5000}:5000"

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_BACKEND_URL: http://localhost:${BACKEND_HOST_PORT:-3001}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"

volumes:
  campaign_builder_db:
  backend_node_modules:
  frontend_node_modules:
